<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID | Project Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; }
        .void-glass { background: rgba(10, 10, 10, 0.7); border: 1px solid #333; backdrop-filter: blur(10px); }
        .text-void { color: #a855f7; text-shadow: 0 0 10px #a855f7; }
        .loading-overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Loading -->
    <div id="loader" class="loading-overlay">
        <div class="animate-bounce mb-4 text-void">SYSTEM_INIT_VOID...</div>
        <div class="w-48 h-1 bg-gray-800"><div id="bar" class="h-full bg-purple-500 w-0 transition-all"></div></div>
    </div>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold mb-10 text-void uppercase tracking-widest">// Project Nexus</h1>
        
        <!-- Dashboard Real-time -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10" id="dash">
            <div class="void-glass p-4 rounded text-center">BATT: <span id="batt">--</span>%</div>
            <div class="void-glass p-4 rounded text-center">RAM: <span id="ram">--</span>GB</div>
            <div class="void-glass p-4 rounded text-center">CPU: <span id="cpu">--</span></div>
            <div class="void-glass p-4 rounded text-center" id="loc">LOC: Loading...</div>
        </div>

        <!-- Repo List (Otomatis muncul dari GitHub) -->
        <div id="repo-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        // 1. Loading Animation
        let p = 0;
        const loader = setInterval(() => { p += 20; document.getElementById('bar').style.width = p + '%'; if(p >= 100) document.getElementById('loader').style.opacity = 0; setTimeout(() => document.getElementById('loader').style.display = 'none', 500); }, 300);

        // 2. Data Hardware (Real-time di Browser)
        if (navigator.getBattery) { navigator.getBattery().then(b => { document.getElementById('batt').innerText = Math.round(b.level * 100); }); }
        document.getElementById('ram').innerText = navigator.deviceMemory || 'N/A';
        document.getElementById('cpu').innerText = navigator.hardwareConcurrency || 'N/A';
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => { document.getElementById('loc').innerText = d.city; });

        // 3. Real-time GitHub Fetch (Otomatis ambil data terbaru tiap buka web)
        const USERNAME = 'Novalindo'; // GANTI PAKE USERNAME GITHUB LU
        fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated`)
            .then(res => res.json())
            .then(repos => {
                const list = document.getElementById('repo-list');
                repos.forEach(r => {
                    list.innerHTML += `
                        <div class="void-glass p-4 rounded hover:border-purple-500 transition cursor-pointer" onclick="window.open('${r.html_url}')">
                            <h3 class="text-purple-400 font-bold uppercase">${r.name}</h3>
                            <p class="text-xs opacity-60 mt-1">${r.description || 'No Description'}</p>
                            <span class="text-[10px] mt-2 block opacity-40">LANG: ${r.language || 'Unknown'}</span>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
